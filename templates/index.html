<!DOCTYPE html>
<html>
<head>
    <title>Lapor Kesehatan Diabetes</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.2);
            width: 400px;
        }
        h2 {
            text-align: center;
            color: #00d2ff;
            margin-bottom: 20px;
        }
        label {
            font-size: 14px;
            color: #b3b3b3;
            font-weight: bold;
        }
        input[type="text"],
        input[type="number"],
        textarea,
        input[type="file"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 20px 0;
            background-color: #2a2a2a;
            border: 1px solid #444;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus, textarea:focus {
            border-color: #00d2ff;
            outline: none;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }
        button {
            width: 100%;
            background-color: #00d2ff;
            color: #121212;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #0099cc;
        }
        .link-btn {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #00d2ff;
            text-decoration: none;
            font-size: 14px;
        }
        .link-btn:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Pantau Diabetes </h2>
        <form action="/submit" method="POST" enctype="multipart/form-data">
            <label>Nama Pasien:</label>
            <input type="text" name="nama" placeholder="Masukkan nama..." required>
            
            <label>Kadar Gula Darah Terakhir (mg/dL):</label>
            <input type="number" name="kadar_gula" placeholder="Contoh: 150" required>
            
            <label>Keluhan Utama:</label>
            <textarea name="keluhan" rows="3" placeholder="Jelaskan keluhan..." required></textarea>
            
            <label>Upload Bukti Cek Lab (Opsional):</label>
            <input type="file" name="file_lab">
            
            <button type="submit">Kirim Laporan</button>
        </form>
        <a href="/dashboard" class="link-btn">Lihat Dashboard Admin &rarr;</a>
    </div>
</body>
</html>
